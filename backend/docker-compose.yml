services:
  postgres:
    image: postgres:16
    container_name: rideshare-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - rideshare_pg_data:/var/lib/postgresql/data

volumes:
  rideshare_pg_data: {}
