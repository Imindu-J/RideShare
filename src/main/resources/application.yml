server:
    port: 8080

spring:
    application:
        name: carpool-rideshare
    datasource:
        url: jdbc:postgresql://localhost:5432/rideshare
        username: ${DB_USERNAME:rideshare_user}
        password: ${DB_PASSWORD:devpassword}
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
    flyway:
        enabled: true
        locations: classpath:/db/migration

app:
    jwt:
        secret: ${JWT_SECRET:this-is-a-temporary-loccal-dev-secret-change-ne-123456789}
        expiration-ms: 86400000
