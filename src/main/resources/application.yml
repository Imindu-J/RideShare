spring:
    application:
        name: carpool-rideshare
    datasource:
        url: jdbc:postgresql://localhost:5432/rideshare
        username: ${DB_USERNAME:rideshare_user}
        password: ${DB_PASSWORD:devpassword}
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true 
    flyway:
        enabled: true
        locations: classpath:/db/migration       

server:
    port: 8080


